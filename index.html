<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Wordle Solver</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">
          <span class="logo-icon">W</span>
          <h1>Wordle Solver</h1>
        </div>
        <p class="subtitle">Entropy-based optimal guessing</p>
      </header>

      <main>
        <div class="status-bar">
          <div class="status-item">
            <span class="status-label">Guess</span>
            <span class="status-value" id="guess-number">1</span>
            <span class="status-label">/ 6</span>
          </div>
          <div class="status-item">
            <span class="status-label">Remaining</span>
            <span class="status-value" id="candidates-count">-</span>
          </div>
        </div>

        <div class="history" id="history"></div>

        <div class="input-section" id="input-section">
          <p class="input-instruction" id="input-instruction">
            Type a word or pick one below
          </p>
          <div class="tiles-row" id="tiles-row">
            <div class="tile" data-index="0" data-color="gray"></div>
            <div class="tile" data-index="1" data-color="gray"></div>
            <div class="tile" data-index="2" data-color="gray"></div>
            <div class="tile" data-index="3" data-color="gray"></div>
            <div class="tile" data-index="4" data-color="gray"></div>
          </div>
          <div class="color-legend" id="color-legend" style="display: none">
            <span class="legend-item"
              ><span class="legend-dot gray-dot"></span> Not in word</span
            >
            <span class="legend-item"
              ><span class="legend-dot yellow-dot"></span> Wrong spot</span
            >
            <span class="legend-item"
              ><span class="legend-dot green-dot"></span> Correct</span
            >
          </div>
          <button class="submit-btn" id="submit-btn" disabled>
            Submit Result
          </button>
        </div>

        <div class="keyboard" id="keyboard">
          <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
          </div>
          <div class="keyboard-row">
            <div class="keyboard-spacer-half"></div>
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
            <div class="keyboard-spacer-half"></div>
          </div>
          <div class="keyboard-row">
            <button class="key key-wide" data-key="BACKSPACE">&#9003;</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key key-wide" data-key="ENTER">Enter</button>
          </div>
        </div>

        <div class="suggestions-section" id="suggestions-section">
          <h2 class="section-title">Best Guesses</h2>
          <div class="suggestions-list" id="suggestions-list"></div>
          <button class="see-more-btn" id="see-more-btn" style="display: none">
            Show more
          </button>
        </div>

        <div class="loading-overlay" id="loading-overlay" style="display: none">
          <div class="spinner"></div>
          <p class="loading-text">Computing entropies...</p>
        </div>

        <div class="solved-overlay" id="solved-overlay" style="display: none">
          <div class="solved-content">
            <div class="solved-emoji">&#127881;</div>
            <h2>Solved!</h2>
            <p id="solved-text"></p>
            <button class="reset-btn" id="reset-btn">Play Again</button>
          </div>
        </div>
      </main>
    </div>

    <script src="solver.js"></script>
    <script src="app.js"></script>
  </body>
</html>
